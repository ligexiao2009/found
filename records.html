<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>理财记录</title>
    <style>
        :root {
            --bg-page: #F2F2F7;
            --card-white: #FFFFFF;
            --profit-bg: #FFF2F3;   
            --profit-text: #D85D61; 
            --loss-bg: #98D0BE;     /* 深绿背景 */
            --loss-text: #0A523F;   /* 极深绿字 */
            --ios-blue: #007AFF;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --ali-color: #1677FF;
            --ths-color: #EE1B2D;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        body {
            font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            /* 再次向上移动，压缩顶部间距 */
            padding: calc(env(safe-area-inset-top) + 5px) 12px env(safe-area-inset-bottom);
            color: var(--text-main);
            -webkit-user-select: none;
        }

        .app-container { max-width: 450px; margin: 0 auto; }

        /* 录入卡片 */
        .input-card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 12px;
        }

        .field-group {
            background: #F2F2F7;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .label-with-icon { 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            font-weight: 600; 
            color: #3A3A3C;
            white-space: nowrap; /* 锁定左侧不换行 */
        }
        
        .brand-icon {
            width: 18px; height: 18px; border-radius: 4px; 
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 10px; margin-right: 6px; font-weight: bold;
        }
        .icon-ali { background: var(--ali-color); }
        .icon-ths { background: var(--ths-color); }

        /* 核心修复：锁定日期在一行，并优化输入框宽度 */
        .input-wrap { 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            flex-shrink: 0;
            white-space: nowrap; 
        }

        #targetDate { 
            color: var(--ios-blue); 
            font-weight: 700; 
            font-size: 15px; /* 稍微调小字号确保不换行 */
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            width: 135px; /* 固定宽度防止抖动 */
            text-align: right;
        }

        .field-group input[type="number"] { 
            border: none; background: transparent; font-size: 16px; 
            font-weight: 600; color: var(--text-main); text-align: right; outline: none;
            width: 100px;
        }

        .sign-toggle {
            background: #E5E5EA;
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .save-btn { 
            width: 100%; background: var(--ios-blue); color: white; border: none; 
            border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; 
            margin-top: 4px;
        }

        /* 汇总面板 */
        .stat-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .month-info .value { font-size: 19px; font-weight: 900; }
        .export-btn { background: #F2F2F7; color: var(--ios-blue); border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; }

        /* 日历卡片 */
        .calendar-card {
            background: var(--card-white);
            border-radius: 22px;
            padding: 16px 10px;
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .cal-title { font-size: 17px; font-weight: 800; }
        .nav-btn { background: #F2F2F7; border: none; width: 32px; height: 32px; border-radius: 10px; font-size: 18px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday { font-size: 12px; color: var(--text-sub); text-align: center; padding-bottom: 8px; font-weight: 600; }

        .day-cell { aspect-ratio: 1 / 1.1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .day-num { font-size: 16px; font-weight: 700; }
        .day-val { font-size: 9px; font-weight: 800; }

        .cell-profit { background-color: var(--profit-bg) !important; color: var(--profit-text) !important; }
        .cell-loss { background-color: var(--loss-bg) !important; color: var(--loss-text) !important; }
        .is-today-text { color: var(--ios-blue); text-decoration: underline; text-underline-offset: 2px; }
        .cell-empty-today { border: 1.5px solid #E5E5EA; }

        .tool-bar { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-sub); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="input-card">
            <div class="field-group">
                <!-- 增加图标并强制一行 -->
                <div class="label-with-icon">📅 记录日期</div>
                <div class="input-wrap">
                    <input type="date" id="targetDate">
                </div>
            </div>
            <div class="field-group">
                <div class="label-with-icon"><span class="brand-icon icon-ali">支</span> 支付宝</div>
                <div class="input-wrap">
                    <button class="sign-toggle" onclick="toggleSign('alipay')">±</button>
                    <input type="number" id="alipay" placeholder="0.00" inputmode="decimal" step="any">
                </div>
            </div>
            <div class="field-group">
                <div class="label-with-icon"><span class="brand-icon icon-ths">同</span> 同花顺</div>
                <div class="input-wrap">
                    <button class="sign-toggle" onclick="toggleSign('ths')">±</button>
                    <input type="number" id="ths" placeholder="0.00" inputmode="decimal" step="any">
                </div>
            </div>
            <button class="save-btn" onclick="saveRecord()">保存数据</button>
        </div>

        <div class="stat-panel">
            <div class="month-info" style="display:flex; align-items:baseline; gap:6px;">
                <span style="font-size:11px; color:var(--text-sub)" id="monthLabel">累计收益</span>
                <span class="value" id="monthTotal">¥ 0.00</span>
            </div>
            <button class="export-btn" onclick="exportCSV()">导出 CSV</button>
        </div>

        <div class="calendar-card">
            <div class="cal-header">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <div class="cal-title" id="monthTitle">加载中...</div>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
                <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
            </div>
        </div>

        <div class="tool-bar"><span onclick="resetData()">🔄 重置全部数据</span></div>
    </div>

    <script>
        let viewDate = new Date();
        const aliInp = document.getElementById('alipay');
        const thsInp = document.getElementById('ths');
        const datePicker = document.getElementById('targetDate');

        function setToday() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            datePicker.value = `${year}-${month}-${day}`;
        }

        function toggleSign(id) {
            const el = document.getElementById(id);
            if (!el.value || el.value === "0") return;
            el.value = (parseFloat(el.value) * -1).toString();
        }

        window.onload = () => { setToday(); render(); };

        function saveRecord() {
            const v1 = parseFloat(aliInp.value) || 0;
            const v2 = parseFloat(thsInp.value) || 0;
            const dateStr = datePicker.value; 
            if (!dateStr) return;

            let db = JSON.parse(localStorage.getItem('fin_v_final_v13') || '{}');
            db[dateStr] = { a: v1, t: v2, total: (v1 + v2).toFixed(2) };
            localStorage.setItem('fin_v_final_v13', JSON.stringify(db));

            const [y, m] = dateStr.split('-');
            viewDate = new Date(y, m - 1, 1);
            aliInp.value = ''; thsInp.value = '';
            render();
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            const weekdays = grid.querySelectorAll('.weekday');
            grid.innerHTML = ''; weekdays.forEach(w => grid.appendChild(w));

            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            document.getElementById('monthTitle').innerText = `${y}年 ${m + 1}月`;
            document.getElementById('monthLabel').innerText = `${m + 1}月累计`;

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const db = JSON.parse(localStorage.getItem('fin_v_final_v13') || '{}');
            let mTotal = 0;

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            for(let d=1; d<=daysInMonth; d++) {
                const dayStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const record = db[dayStr];
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                let isToday = (dayStr === todayStr);
                let labelText = isToday ? '今' : d;
                let html = `<div class="day-num ${isToday ? 'is-today-text' : ''}">${labelText}</div>`;

                if(record) {
                    const val = parseFloat(record.total);
                    if (y === viewDate.getFullYear() && m === viewDate.getMonth()) mTotal += val;
                    const isPos = val >= 0;
                    cell.classList.add(isPos ? 'cell-profit' : 'cell-loss');
                    html += `<div class="day-val">${isPos?'+':''}${val}</div>`;
                } else if(isToday) { cell.classList.add('cell-empty-today'); }
                
                cell.innerHTML = html;
                grid.appendChild(cell);
            }
            const totalDisplay = document.getElementById('monthTotal');
            totalDisplay.innerText = `¥ ${mTotal.toFixed(2)}`;
            totalDisplay.style.color = mTotal >= 0 ? 'var(--profit-text)' : 'var(--loss-text)';
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }
        function exportCSV() {
            const db = JSON.parse(localStorage.getItem('fin_v_final_v13') || '{}');
            if(Object.keys(db).length === 0) return alert('无数据');
            let csv = "\ufeff日期,支付宝,同花顺,合计\n";
            Object.keys(db).sort().forEach(k => {
                const r = db[k]; csv += `${k},${r.a},${r.t},${r.total}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `理财明细.csv`; a.click();
        }
        function resetData() { if(confirm('重置全部？')) { localStorage.removeItem('fin_v_final_v13'); render(); } }
    </script>
</body>
</html>
