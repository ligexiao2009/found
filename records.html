<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>理财记录</title>
    <style>
        :root {
            --bg-page: #F2F2F7;
            --card-white: #FFFFFF;
            /* 盈亏色彩方案 - 深度加深 */
            --profit-bg: #FFF2F3;   
            --profit-text: #D85D61; 
            --loss-bg: #98D0BE;     /* 深绿背景 */
            --loss-text: #0A523F;   /* 极深绿字 */
            --ios-blue: #007AFF;
            --text-main: #1C1C1E;
            --text-sub: #8E8E93;
            --ali-color: #1677FF;
            --ths-color: #EE1B2D;
        }

        /* 隐藏输入框箭头 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        body {
            font-family: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            /* 核心修改：增加顶部间距，适配刘海屏 */
            padding: calc(env(safe-area-inset-top) + 40px) 16px env(safe-area-inset-bottom);
            color: var(--text-main);
            -webkit-user-select: none;
        }

        .app-container { max-width: 450px; margin: 0 auto; }

        header { display: flex; align-items: center; margin: 0 0 20px 4px; }
        header .title-icon { font-size: 24px; margin-right: 8px; }
        header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }

        /* 录入卡片 */
        .input-card {
            background: var(--card-white);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .field-group {
            background: #F2F2F7;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .label-with-icon { display: flex; align-items: center; font-size: 14px; font-weight: 600; color: #3A3A3C; }
        
        .brand-icon {
            width: 20px; height: 20px; border-radius: 5px; 
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 12px; margin-right: 8px; font-weight: bold;
        }
        .icon-ali { background: var(--ali-color); }
        .icon-ths { background: var(--ths-color); }

        .field-group input { 
            border: none; background: transparent; font-size: 16px; 
            font-weight: 600; color: var(--ios-blue); text-align: right; outline: none;
        }
        .field-group input[type="number"] { color: var(--text-main); width: 140px; }

        .save-btn { 
            width: 100%; background: var(--ios-blue); color: white; border: none; 
            border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; 
            margin-top: 5px; box-shadow: 0 4px 12px rgba(0,122,255,0.2);
        }
        .save-btn:active { opacity: 0.8; transform: scale(0.98); }

        /* 汇总统计行 */
        .stat-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #fff;
            border-radius: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .month-info { display: flex; align-items: baseline; gap: 8px; }
        .month-info .label { font-size: 12px; color: var(--text-sub); }
        .month-info .value { font-size: 20px; font-weight: 900; }

        .export-btn {
            background: #F2F2F7;
            color: var(--ios-blue);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        /* 日历卡片 */
        .calendar-card {
            background: var(--card-white);
            border-radius: 24px;
            padding: 20px 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-title { font-size: 18px; font-weight: 800; }
        .nav-btn { background: #F2F2F7; border: none; width: 36px; height: 36px; border-radius: 12px; font-size: 20px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { font-size: 13px; color: var(--text-sub); text-align: center; padding-bottom: 10px; font-weight: 600; }

        /* 日历核心样式优化 */
        .day-cell {
            aspect-ratio: 1 / 1.1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }
        .day-num { font-size: 17px; font-weight: 700; margin-bottom: 1px; }
        .day-val { font-size: 10px; font-weight: 800; transform: scale(0.95); }

        .cell-profit { background-color: var(--profit-bg) !important; color: var(--profit-text) !important; }
        .cell-loss { background-color: var(--loss-bg) !important; color: var(--loss-text) !important; }
        
        .is-today-text { color: var(--ios-blue); font-weight: 900; text-decoration: underline; text-underline-offset: 3px; }
        .cell-empty-today { border: 2px solid #E5E5EA; }

        .tool-bar { text-align: center; margin-top: 30px; font-size: 11px; color: var(--text-sub); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <span class="title-icon">💰</span>
            <h1>理财记录</h1>
        </header>

        <!-- 输入区域 -->
        <div class="input-card">
            <div class="field-group">
                <div class="label-with-icon">📅 记录日期</div>
                <input type="date" id="targetDate">
            </div>
            <div class="field-group">
                <div class="label-with-icon"><span class="brand-icon icon-ali">支</span> 支付宝</div>
                <input type="number" id="alipay" placeholder="0.00" inputmode="decimal" step="any">
            </div>
            <div class="field-group">
                <div class="label-with-icon"><span class="brand-icon icon-ths">同</span> 同花顺</div>
                <input type="number" id="ths" placeholder="0.00" inputmode="decimal" step="any">
            </div>
            <button class="save-btn" onclick="saveRecord()">保存今日收益</button>
        </div>

        <!-- 汇总统计栏 -->
        <div class="stat-panel">
            <div class="month-info">
                <span class="label" id="monthLabel">累计收益</span>
                <span class="value" id="monthTotal">¥ 0.00</span>
            </div>
            <button class="export-btn" onclick="exportCSV()">📥 导出 CSV</button>
        </div>

        <!-- 日历面板 -->
        <div class="calendar-card">
            <div class="cal-header">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <div class="cal-title" id="monthTitle">加载中...</div>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
                <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
            </div>
        </div>

        <div class="tool-bar">
            <span onclick="resetData()">🔄 重置全部数据</span>
        </div>
    </div>

    <script>
        let viewDate = new Date();
        const aliInp = document.getElementById('alipay');
        const thsInp = document.getElementById('ths');
        const datePicker = document.getElementById('targetDate');

        // 设置日期为今天
        function setToday() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            datePicker.value = `${year}-${month}-${day}`;
        }

        window.onload = () => {
            setToday();
            render();
        };

        function saveRecord() {
            const v1 = parseFloat(aliInp.value) || 0;
            const v2 = parseFloat(thsInp.value) || 0;
            const selectedDate = new Date(datePicker.value.replace(/-/g, '/')); 
            
            const key = `${selectedDate.getFullYear()}-${selectedDate.getMonth()+1}-${selectedDate.getDate()}`;
            let db = JSON.parse(localStorage.getItem('fin_v_final_v9') || '{}');
            db[key] = { a: v1, t: v2, total: (v1 + v2).toFixed(2) };
            localStorage.setItem('fin_v_final_v9', JSON.stringify(db));

            viewDate = new Date(selectedDate);
            aliInp.value = ''; thsInp.value = '';
            render();
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            const weekdays = grid.querySelectorAll('.weekday');
            grid.innerHTML = ''; weekdays.forEach(w => grid.appendChild(w));

            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            document.getElementById('monthTitle').innerText = `${y}年 ${m + 1}月`;
            document.getElementById('monthLabel').innerText = `${m + 1}月收益`;

            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const db = JSON.parse(localStorage.getItem('fin_v_final_v9') || '{}');
            let mTotal = 0;

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

            const now = new Date();
            const todayKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;

            for(let d=1; d<=daysInMonth; d++) {
                const key = `${y}-${m+1}-${d}`;
                const record = db[key];
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                let isToday = (key === todayKey);
                let labelText = isToday ? '今' : d;
                let html = `<div class="day-num ${isToday ? 'is-today-text' : ''}">${labelText}</div>`;

                if(record) {
                    const val = parseFloat(record.total);
                    if (y === viewDate.getFullYear() && m === viewDate.getMonth()) mTotal += val;
                    const isPos = val >= 0;
                    cell.classList.add(isPos ? 'cell-profit' : 'cell-loss');
                    html += `<div class="day-val">${isPos?'+':''}${val}</div>`;
                } else if(isToday) {
                    cell.classList.add('cell-empty-today');
                }
                
                cell.innerHTML = html;
                grid.appendChild(cell);
            }
            const totalDisplay = document.getElementById('monthTotal');
            totalDisplay.innerText = `¥ ${mTotal.toFixed(2)}`;
            totalDisplay.style.color = mTotal >= 0 ? 'var(--profit-text)' : 'var(--loss-text)';
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); render(); }

        function exportCSV() {
            const db = JSON.parse(localStorage.getItem('fin_v_final_v9') || '{}');
            if(Object.keys(db).length === 0) return alert('暂无数据');
            let csv = "\ufeff日期,支付宝收益,同花顺收益,合计收益\n";
            Object.keys(db).sort().forEach(k => {
                const r = db[k];
                csv += `${k},${r.a},${r.t},${r.total}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `理财记录明细_${viewDate.getMonth()+1}月.csv`;
            a.click();
        }

        function resetData() { if(confirm('确定永久清除所有记录？')) { localStorage.removeItem('fin_v_final_v9'); render(); } }
    </script>
</body>
</html>
