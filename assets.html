<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>财富看板-导出增强版</title>
    <style>
        :root {
            --ali: #1677ff; --wx: #07c160; --ths: #ff4d4f;
            --cry: #f7931a; --cmb: #c51d24; --gjj: #0052d9;
            --up: #52c41a; --down: #ff4d4f;
            --summary-bg: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
        }
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .app-card { background: #fff; border-radius: 24px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); height: fit-content; }
        
        .summary-card { background: var(--summary-bg); padding: 15px 18px; border-radius: 16px; color: #fff; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 20px rgba(20, 136, 204, 0.2); }
        .summary-val { font-size: 24px; font-weight: 700; font-family: "DIN Alternate", sans-serif; }
        .update-time { font-size: 10px; color: #999; text-align: right; margin: 5px 5px 20px 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 12px; margin-bottom: 20px; }
        .brand-line { width: 3px; height: 10px; border-radius: 2px; margin-right: 6px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: #888; }
        .input-box { position: relative; border-bottom: 1px solid #eee; }
        .input-box::before { content: "¥"; position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #333; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 8px 0 8px 18px; border: none; background: transparent; font-size: 18px; font-weight: 600; outline: none; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .save-btn { background: #1488cc; color: white; }
        .export-btn { background: #f0f2f5; color: #555; }
        button:active { opacity: 0.8; transform: scale(0.98); }

        .chart-section { border-top: 1px solid #f0f0f0; padding-top: 15px; margin-top: 20px; }
        .section-title { font-size: 13px; color: #333; font-weight: 600; margin-bottom: 10px; }
        .chart-wrapper { width: 100%; height: 160px; position: relative; padding-left: 35px; box-sizing: border-box; }
        .chart-svg { width: 100%; height: 130px; overflow: visible; }
        .axis-text { font-size: 9px; fill: #aaa; }
        .chart-path { fill: none; stroke: #1488cc; stroke-width: 2.5; }
        .chart-area { fill: url(#grad); opacity: 0.1; }

        .history-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #f9f9f9; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .hist-amount { font-size: 14px; font-weight: 700; color: #333; }
        .hist-diff { font-size: 10px; font-weight: 600; margin-left: 5px; }
        .diff-up { color: var(--up); }
        .diff-down { color: var(--down); }
        .hist-time { font-size: 10px; color: #bbb; }
        .del-icon-btn { width: 24px; height: 24px; border-radius: 6px; background: #fff5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .del-icon-btn svg { width: 12px; height: 12px; fill: #ff4d4f; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="summary-card">
        <div style="font-size: 11px; opacity: 0.8;">净资产总计</div>
        <div class="summary-val">¥ <span id="res">0.00</span></div>
    </div>
    <div class="update-time">最后编辑：<span id="last-update">从未</span></div>

    <div class="grid">
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--ali)"></div>支付宝</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--wx)"></div>微信支付</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--ths)"></div>同花顺</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--cry)"></div>加密资产</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--cmb)"></div>招商银行</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--gjj)"></div>公积金</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" placeholder="0"></div></div>
    </div>

    <div class="btn-group">
        <button class="save-btn" onclick="saveRecord()">保存快照</button>
        <button class="export-btn" onclick="exportToExcel()">导出Excel</button>
    </div>

    <div class="history-section">
        <div class="section-title">历史明细记录</div>
        <div class="history-list" id="hist-list"></div>
    </div>

    <div class="chart-section" id="chart-section" style="display:none;">
        <div class="section-title">资产趋势图</div>
        <div class="chart-wrapper">
            <svg class="chart-svg" id="svg-chart">
                <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1488cc"/><stop offset="100%" stop-color="#fff"/></linearGradient></defs>
                <text x="-35" y="10" class="axis-text" id="y-max"></text>
                <text x="-35" y="130" class="axis-text" id="y-min"></text>
                <text x="0" y="150" class="axis-text" id="x-start"></text>
                <text x="100%" y="150" class="axis-text" text-anchor="end" id="x-end"></text>
                <path class="chart-area" id="chart-area"></path>
                <path class="chart-path" id="chart-path"></path>
            </svg>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisplay = document.getElementById('res');
    const timeDisplay = document.getElementById('last-update');
    const histList = document.getElementById('hist-list');

    window.onload = () => {
        inputs.forEach(i => {
            const saved = localStorage.getItem('vExcel_' + i.id);
            if (saved) i.value = saved;
        });
        renderHistory();
        updateDisplay(false);
    };

    function updateDisplay(shouldUpdateTime = true) {
        let sum = 0;
        inputs.forEach(i => sum += (parseFloat(i.value) || 0));
        resDisplay.innerText = sum.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
        if (shouldUpdateTime) timeDisplay.innerText = new Date().toLocaleString('zh-CN', { hour12: false });
    }

    function saveRecord() {
        const amountNum = parseFloat(resDisplay.innerText.replace(/,/g, ""));
        if (amountNum <= 0) return;
        const now = new Date();
        const shortDate = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
        const fullTime = now.toLocaleString('zh-CN', { hour12: false });
        let records = JSON.parse(localStorage.getItem('vExcel_history') || "[]");
        records.unshift({ amount: amountNum, time: fullTime, date: shortDate });
        localStorage.setItem('vExcel_history', JSON.stringify(records));
        renderHistory();
    }

    function renderHistory() {
        let records = JSON.parse(localStorage.getItem('vExcel_history') || "[]");
        histList.innerHTML = records.map((r, index) => {
            let diffHtml = "";
            if (index < records.length - 1) {
                const diff = r.amount - records[index + 1].amount;
                diffHtml = `<span class="hist-diff ${diff >= 0 ? 'diff-up' : 'diff-down'}">${diff >= 0 ? '+' : ''}${diff.toLocaleString()}</span>`;
            }
            return `<div class="history-item"><div><div class="hist-amount">¥ ${r.amount.toLocaleString()} ${diffHtml}</div><div class="hist-time">${r.time}</div></div><div class="del-icon-btn" onclick="deleteHistory(${index})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div></div>`;
        }).join('');
        drawChart(records);
    }

    function drawChart(records) {
        const section = document.getElementById('chart-section');
        if (records.length < 2) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        const dataObjs = [...records].reverse();
        const data = dataObjs.map(r => r.amount);
        const width = document.getElementById('svg-chart').clientWidth;
        const height = 130;
        let max = Math.max(...data); let min = Math.min(...data);
        if (max === min) { max += 100; min -= 100; }
        document.getElementById('y-max').textContent = (max/10000).toFixed(1) + 'w';
        document.getElementById('y-min').textContent = (min/10000).toFixed(1) + 'w';
        document.getElementById('x-start').textContent = dataObjs[0].date;
        document.getElementById('x-end').textContent = dataObjs[dataObjs.length-1].date;
        const points = data.map((val, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - ((val - min) / (max - min)) * height;
            return `${x},${y}`;
        });
        const d = `M ${points.join(' L ')}`;
        document.getElementById('chart-path').setAttribute('d', d);
        document.getElementById('chart-area').setAttribute('d', `${d} L ${width},${height} L 0,${height} Z`);
    }

    function exportToExcel() {
        let records = JSON.parse(localStorage.getItem('vExcel_history') || "[]");
        if (records.length === 0) return alert("没有记录可导出");
        
        let csvContent = "\uFEFF保存日期,资产总额,对比增长\n"; // 添加BOM防止乱码
        records.forEach((r, index) => {
            let diffStr = "初始记录";
            if (index < records.length - 1) {
                const diff = r.amount - records[index + 1].amount;
                diffStr = (diff >= 0 ? "+" : "") + diff.toFixed(2);
            }
            csvContent += `${r.time},${r.amount.toFixed(2)},${diffStr}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `财富记录_${new Date().toLocaleDateString()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function deleteHistory(index) {
        let records = JSON.parse(localStorage.getItem('vExcel_history') || "[]");
        records.splice(index, 1);
        localStorage.setItem('vExcel_history', JSON.stringify(records));
        renderHistory();
    }

    inputs.forEach(i => i.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d.]/g, "").replace(/\.(?=.*\.)/g, "");
        localStorage.setItem('vExcel_' + e.target.id, e.target.value);
        updateDisplay(true);
    }));
</script>

</body>
</html>
