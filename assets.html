<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>财富看板-精准坐标版</title>
    <style>
        :root {
            --ali: #1677ff; --wx: #07c160; --ths: #ff4d4f;
            --cry: #f7931a; --cmb: #c51d24; --gjj: #0052d9;
            --up: #52c41a; --down: #ff4d4f;
            --summary-bg: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%);
        }
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .app-card { background: #fff; border-radius: 24px; padding: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); height: fit-content; }
        
        /* 顶部汇总 */
        .summary-card { background: var(--summary-bg); padding: 15px 18px; border-radius: 16px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .summary-val { font-size: 24px; font-weight: 700; font-family: "DIN Alternate", sans-serif; }
        .update-time { font-size: 10px; color: #999; text-align: right; margin: 5px 5px 15px 0; }

        /* 输入区 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 12px; margin-bottom: 20px; }
        .brand-line { width: 3px; height: 10px; border-radius: 2px; margin-right: 6px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: #888; }
        .input-box { position: relative; border-bottom: 1px solid #eee; }
        .input-box::before { content: "¥"; position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #333; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 8px 0 8px 18px; border: none; background: transparent; font-size: 18px; font-weight: 600; color: #333; outline: none; }

        .save-btn { width: 100%; background: #1488cc; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }

        /* 历史明细 */
        .history-section { border-top: 1px solid #f0f0f0; padding-top: 15px; }
        .section-title { font-size: 13px; color: #333; font-weight: 600; margin-bottom: 10px; }
        .history-list { max-height: 180px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .hist-amount { font-size: 14px; font-weight: 700; color: #333; }
        .hist-diff { font-size: 10px; font-weight: 600; margin-left: 5px; }
        .diff-up { color: var(--up); }
        .diff-down { color: var(--down); }
        .hist-time { font-size: 10px; color: #bbb; }
        .del-icon-btn { width: 24px; height: 24px; border-radius: 6px; background: #fff5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .del-icon-btn svg { width: 12px; height: 12px; fill: #ff4d4f; }

        /* 底部图表分析 (带 X/Y 轴) */
        .chart-section { border-top: 1px dashed #eee; padding-top: 20px; margin-top: 15px; }
        .chart-wrapper { width: 100%; height: 160px; position: relative; padding-left: 35px; padding-bottom: 25px; box-sizing: border-box; }
        .chart-svg { width: 100%; height: 100%; overflow: visible; }
        .axis-text { font-size: 9px; fill: #aaa; font-family: sans-serif; }
        .chart-path { fill: none; stroke: #1488cc; stroke-width: 2.5; stroke-linecap: round; }
        .chart-area { fill: url(#grad); opacity: 0.1; }

        .analysis-section { padding-top: 20px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #f9f9f9; }
        .pie-chart { width: 80px; height: 80px; border-radius: 50%; background: #f0f0f0; position: relative; margin-bottom: 10px; }
        .pie-chart::after { content: ""; position: absolute; width: 44px; height: 44px; background: white; border-radius: 50%; top: 18px; left: 18px; }
        .chart-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 15px; width: 100%; font-size: 11px; color: #777; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="summary-card">
        <div style="font-size: 11px; opacity: 0.8;">净资产总计</div>
        <div class="summary-val">¥ <span id="res">0.00</span></div>
    </div>
    <div class="update-time">编辑：<span id="last-update">从未</span></div>

    <div class="grid">
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--ali)"></div>支付宝</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" data-color="var(--ali)" data-name="支付宝" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--wx)"></div>微信支付</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" data-color="var(--wx)" data-name="微信" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--ths)"></div>同花顺</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" data-color="var(--ths)" data-name="同花顺" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--cry)"></div>加密资产</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" data-color="var(--cry)" data-name="加密" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--cmb)"></div>招商银行</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" data-color="var(--cmb)" data-name="招行" placeholder="0"></div></div>
        <div class="item"><div class="label-wrap"><div class="brand-line" style="background:var(--gjj)"></div>公积金</div><div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" data-color="var(--gjj)" data-name="公积金" placeholder="0"></div></div>
    </div>

    <button class="save-btn" onclick="saveRecord()">保存快照记录</button>

    <div class="history-section">
        <div class="section-title">资产历史明细</div>
        <div class="history-list" id="hist-list"></div>
    </div>

    <div class="chart-section" id="charts-container" style="display:none;">
        <div class="section-title" style="text-align:center;margin-bottom:15px;">资产趋势与分布</div>
        <!-- 趋势曲线图 (精准 X/Y 轴) -->
        <div class="chart-wrapper">
            <svg class="chart-svg" id="svg-chart">
                <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1488cc"/><stop offset="100%" stop-color="#fff"/></linearGradient></defs>
                <!-- Y轴文字 -->
                <text x="-35" y="5" class="axis-text" id="y-max"></text>
                <text x="-35" y="130" class="axis-text" id="y-min"></text>
                <!-- X轴文字 (日期) -->
                <text x="0" y="150" class="axis-text" id="x-start"></text>
                <text x="100%" y="150" class="axis-text" text-anchor="end" id="x-end"></text>
                
                <path class="chart-area" id="chart-area"></path>
                <path class="chart-path" id="chart-path"></path>
            </svg>
        </div>

        <div class="analysis-section" id="pie-box">
            <div class="pie-chart" id="pie"></div>
            <div class="chart-legend" id="legend"></div>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisplay = document.getElementById('res');
    const timeDisplay = document.getElementById('last-update');
    const histList = document.getElementById('hist-list');

    window.onload = () => {
        inputs.forEach(i => {
            const saved = localStorage.getItem('v15_' + i.id);
            if (saved) i.value = saved;
        });
        renderHistory();
        updateDisplay(false);
    };

    function updateDisplay(shouldUpdateTime = true) {
        let sum = 0;
        let segments = [];
        inputs.forEach(i => {
            const val = parseFloat(i.value) || 0;
            sum += val;
            if (val > 0) segments.push({ name: i.getAttribute('data-name'), value: val, color: i.getAttribute('data-color') });
        });

        resDisplay.innerText = sum.toLocaleString('zh-CN', { minimumFractionDigits: 2 });

        if (sum > 0) {
            document.getElementById('pie-box').style.display = 'flex';
            let curr = 0;
            let grad = segments.map(s => {
                let end = curr + (s.value / sum) * 100;
                let res = `${s.color} ${curr}% ${end}%`;
                curr = end;
                return res;
            }).join(', ');
            document.getElementById('pie').style.background = `conic-gradient(${grad})`;
            document.getElementById('legend').innerHTML = segments.map(s => {
                let p = ((s.value / sum) * 100).toFixed(1);
                return `<div style="display:flex;align-items:center;"><div style="width:6px;height:6px;border-radius:50%;background:${s.color};margin-right:4px;"></div>${s.name} ${p}%</div>`
            }).join('');
        }
        if (shouldUpdateTime) timeDisplay.innerText = new Date().toLocaleString('zh-CN', { hour12: false });
    }

    function saveRecord() {
        const amountNum = parseFloat(resDisplay.innerText.replace(/,/g, ""));
        if (amountNum <= 0) return;
        // 保存时携带完整日期
        const now = new Date();
        const dateStr = `${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
        const fullStr = now.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
        
        let records = JSON.parse(localStorage.getItem('v15_history') || "[]");
        records.unshift({ amount: amountNum, time: fullStr, shortDate: dateStr });
        localStorage.setItem('v15_history', JSON.stringify(records));
        renderHistory();
    }

    function renderHistory() {
        let records = JSON.parse(localStorage.getItem('v15_history') || "[]");
        histList.innerHTML = records.map((r, index) => {
            let diffHtml = "";
            if (index < records.length - 1) {
                const diff = r.amount - records[index + 1].amount;
                diffHtml = `<span class="hist-diff ${diff >= 0 ? 'diff-up' : 'diff-down'}">${diff >= 0 ? '+' : ''}${diff.toLocaleString()}</span>`;
            }
            return `<div class="history-item"><div><div class="hist-amount">¥ ${r.amount.toLocaleString()} ${diffHtml}</div><div class="hist-time">${r.time}</div></div><div class="del-icon-btn" onclick="deleteHistory(${index})"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div></div>`;
        }).join('');
        drawChart(records);
    }

    function drawChart(records) {
        const container = document.getElementById('charts-container');
        if (records.length < 2) { container.style.display = 'none'; return; }
        container.style.display = 'block';

        const dataObjs = [...records].reverse();
        const data = dataObjs.map(r => r.amount);
        const width = document.getElementById('svg-chart').clientWidth;
        const height = 130;
        
        let max = Math.max(...data);
        let min = Math.min(...data);
        if (max === min) { max += 100; min -= 100; }
        
        // Y轴：万位单位
        document.getElementById('y-max').textContent = (max/10000).toFixed(1) + 'w';
        document.getElementById('y-min').textContent = (min/10000).toFixed(1) + 'w';
        
        // X轴：起止日期 (月-日)
        document.getElementById('x-start').textContent = dataObjs[0].shortDate || dataObjs[0].time.substring(0,5);
        document.getElementById('x-end').textContent = dataObjs[dataObjs.length-1].shortDate || dataObjs[dataObjs.length-1].time.substring(0,5);

        const points = data.map((val, i) => {
            const x = (i / (data.length - 1)) * width;
            const y = height - ((val - min) / (max - min)) * height;
            return `${x},${y}`;
        });

        const d = `M ${points.join(' L ')}`;
        document.getElementById('chart-path').setAttribute('d', d);
        document.getElementById('chart-area').setAttribute('d', `${d} L ${width},${height} L 0,${height} Z`);
    }

    function deleteHistory(index) {
        let records = JSON.parse(localStorage.getItem('v15_history') || "[]");
        records.splice(index, 1);
        localStorage.setItem('v15_history', JSON.stringify(records));
        renderHistory();
    }

    inputs.forEach(i => i.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^\d.]/g, "").replace(/\.(?=.*\.)/g, "");
        localStorage.setItem('v15_' + e.target.id, e.target.value);
        updateDisplay(true);
    }));
</script>

</body>
</html>
