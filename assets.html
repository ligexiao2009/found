<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>财富看板-专业版</title>
    <style>
        :root {
            --ali: #1677ff; --wx: #07c160; --ths: #ff4d4f;
            --cry: #f7931a; --cmb: #c51d24; --gjj: #0052d9;
            --debt: #555; --up: #2ecc71; --down: #e74c3c;
            --app-bg: #f2f4f7; --card-bg: #ffffff;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--app-bg); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .app-card { background: var(--card-bg); border-radius: 28px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); height: fit-content; }
        
        /* 顶部总览及动画 */
        .summary-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); padding: 22px; border-radius: 20px; color: #fff; box-shadow: 0 10px 20px rgba(30, 60, 114, 0.2); transition: transform 0.2s; }
        .summary-val { font-size: 30px; font-weight: 700; font-family: "DIN Alternate", sans-serif; margin-top: 5px; }
        .update-time { font-size: 10px; color: #a0aec0; text-align: right; margin: 8px 0 20px 0; }
        
        @keyframes save-flash {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }
        .save-active { animation: save-flash 0.4s ease-out; }

        /* 输入网格 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px 12px; margin-bottom: 20px; }
        .label-wrap { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: #888; }
        .brand-line { width: 3px; height: 10px; border-radius: 2px; margin-right: 6px; }
        .input-box { position: relative; border-bottom: 1.5px solid #eee; }
        .input-box::before { content: "¥"; position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #333; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 8px 0 8px 18px; border: none; background: transparent; font-size: 17px; font-weight: 600; outline: none; color: #333; box-sizing: border-box; }
        
        /* 按钮 */
        .btn-stack { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .save-btn { background: #1488cc; color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sec-btn { background: #f8f9fa; color: #444; border: 1px solid #eee; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* 历史记录样式 - 改为居中布局 */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 13px; font-weight: 700; color: #333; }
        .clear-all-btn { color: var(--down); font-size: 11px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; background: #fff1f0; border: none; }
        
        .history-list { max-height: 260px; overflow-y: auto; }
        .history-item { 
            display: grid;
            grid-template-columns: 1.2fr 1fr 40px; /* 三栏布局 */
            align-items: center; 
            padding: 12px; background: #f8fafc; border-radius: 14px; 
            margin-bottom: 10px; border: 1px solid #f1f5f9;
        }
        .hist-info-left { display: flex; flex-direction: column; }
        .hist-amount { font-size: 14px; font-weight: 700; font-family: "DIN Alternate", sans-serif; }
        .hist-time-center { font-size: 10px; color: #94a3b8; text-align: center; font-variant-numeric: tabular-nums; }
        .diff-tag { font-size: 9px; padding: 1px 4px; border-radius: 4px; font-weight: 800; margin-top: 2px; width: fit-content; }
        .diff-up { background: #e6f9ed; color: var(--up); }
        .diff-down { background: #fff1f0; color: var(--down); }
        
        .del-btn-wrap { justify-self: end; }
        .del-btn { width: 28px; height: 28px; border-radius: 8px; background: #fff; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .chart-box { width: 100%; height: 160px; margin-top: 15px; }
        .chart-svg { width: 100%; height: 130px; overflow: visible; }
        .axis-label { font-size: 9px; fill: #aaa; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="summary-card" id="summary-card">
        <div style="font-size: 11px; opacity: 0.8; letter-spacing: 1px;">NET WORTH / 净资产总额</div>
        <div class="summary-val">¥ <span id="res">0.00</span></div>
    </div>
    <div class="update-time">最后编辑：<span id="last-update">从未</span></div>

    <div class="grid">
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--ali)"></div>支付宝</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="alipay" data-name="支付宝" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--wx)"></div>微信支付</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="wechat" data-name="微信" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--ths)"></div>同花顺</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="ths" data-name="同花顺" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--cry)"></div>加密币</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="crypto" data-name="加密币" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--cmb)"></div>招商银行</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="cmb" data-name="招行" placeholder="0.00"></div>
        </div>
        <div class="item">
            <div class="label-wrap"><div class="brand-line" style="background:var(--gjj)"></div>公积金</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="provident" data-name="公积金" placeholder="0.00"></div>
        </div>
        <div class="item" style="grid-column: span 2;">
            <div class="label-wrap"><div class="brand-line" style="background:var(--debt)"></div>欠款 / 负债项</div>
            <div class="input-box"><input type="text" inputmode="decimal" class="asset-input" id="debt" data-name="负债" placeholder="0.00" style="color:var(--down)"></div>
        </div>
    </div>

    <div class="btn-stack">
        <button class="save-btn" onclick="saveRecord()">保存快照</button>
        <div class="secondary-btns">
            <button class="sec-btn" onclick="document.getElementById('fileIn').click()">📤 导入</button>
            <button class="sec-btn" onclick="exportData()">📥 导出 CSV</button>
        </div>
        <input type="file" id="fileIn" style="display:none" accept=".csv" onchange="importData(this)">
    </div>

    <div class="history-section">
        <div class="history-header">
            <span class="section-title">资产轨迹</span>
            <button class="clear-all-btn" onclick="clearAllHistory()">清空</button>
        </div>
        <div class="history-list" id="hist-list"></div>
        
        <div class="chart-box" id="chart-wrap" style="display:none;">
            <svg class="chart-svg" id="svg-chart">
                <defs>
                    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#1488cc" stop-opacity="0.2"/>
                        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <text x="0" y="10" class="axis-label" id="y-max"></text>
                <text x="0" y="125" class="axis-label" id="y-min"></text>
                <text x="0" y="145" class="axis-label" id="x-start"></text>
                <text x="100%" y="145" class="axis-label" text-anchor="end" id="x-end"></text>
                <path fill="url(#g)" id="c-area"></path>
                <path fill="none" stroke="#1488cc" stroke-width="2.5" id="c-line" stroke-linejoin="round" stroke-linecap="round"></path>
            </svg>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.asset-input');
    const resDisp = document.getElementById('res');
    const timeDisp = document.getElementById('last-update');
    const histList = document.getElementById('hist-list');
    const ASSET_KEYS = ['alipay', 'wechat', 'ths', 'crypto', 'cmb', 'provident', 'debt'];

    window.onload = () => {
        ASSET_KEYS.forEach(k => {
            const v = localStorage.getItem('v_all_fn_' + k);
            if (v) document.getElementById(k).value = v;
        });
        render();
        update(false);
    };

    function update(shoudTime = true) {
        let assets = 0;
        let debt = parseFloat(document.getElementById('debt').value) || 0;
        ASSET_KEYS.forEach(k => { if(k !== 'debt') assets += (parseFloat(document.getElementById(k).value) || 0); });
        const netWorth = assets - debt;
        resDisp.innerText = netWorth.toLocaleString('zh-CN', {minimumFractionDigits: 2});
        if (shoudTime) timeDisp.innerText = new Date().toLocaleString('zh-CN', {hour12: false});
    }

    function saveRecord() {
        const total = parseFloat(resDisp.innerText.replace(/,/g, ''));
        const now = new Date();
        const fullTime = now.toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false});
        const chartDay = `${now.getMonth()+1}-${now.getDate()}`;
        
        let detail = {};
        ASSET_KEYS.forEach(k => detail[k] = document.getElementById(k).value || "0");

        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        h.unshift({amount: total, time: fullTime, day: chartDay, detail: detail});
        localStorage.setItem('v_all_fn_hist', JSON.stringify(h));
        
        render();
        const card = document.getElementById('summary-card');
        card.classList.remove('save-active');
        void card.offsetWidth; 
        card.classList.add('save-active');
    }

    function render() {
        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        histList.innerHTML = h.map((r, i) => {
            let diffHtml = "";
            if (i < h.length - 1) {
                const d = r.amount - h[i+1].amount;
                const cls = d >= 0 ? 'diff-up' : 'diff-down';
                const symbol = d >= 0 ? '+' : '-';
                diffHtml = `<span class="diff-tag ${cls}">${symbol}${Math.abs(d).toLocaleString()}</span>`;
            } else {
                diffHtml = `<span class="diff-tag" style="background:#eee;color:#999">初始</span>`;
            }
            return `
            <div class="history-item">
                <div class="hist-info-left">
                    <div class="hist-amount">¥${r.amount.toLocaleString()}</div>
                    ${diffHtml}
                </div>
                <div class="hist-time-center">${r.time}</div>
                <div class="del-btn-wrap">
                    <button class="del-btn" onclick="del(${i})">
                        <svg width="12" height="12" fill="#ff4d4f" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            </div>`;
        }).join('');
        draw(h);
    }

    function draw(h) {
        const box = document.getElementById('chart-wrap');
        if (h.length < 2) { box.style.display='none'; return; }
        box.style.display='block';
        const data = [...h].reverse().slice(-10);
        const vals = data.map(r => r.amount);
        const w = document.getElementById('svg-chart').clientWidth;
        const ht = 120;
        let max = Math.max(...vals), min = Math.min(...vals);
        let pad = (max - min) * 0.2 || 1000;
        max += pad; min -= pad;

        document.getElementById('y-max').textContent = (max/10000).toFixed(1)+'w';
        document.getElementById('y-min').textContent = (min/10000).toFixed(1)+'w';
        document.getElementById('x-start').textContent = data[0].day;
        document.getElementById('x-end').textContent = data[data.length-1].day;

        const pts = vals.map((v, i) => {
            const x = (i/(vals.length-1)) * w;
            const y = ht - ((v-min)/(max-min)) * ht;
            return `${x},${y}`;
        });
        const d = `M ${pts.join(' L ')}`;
        document.getElementById('c-line').setAttribute('d', d);
        document.getElementById('c-area').setAttribute('d', `${d} L ${w},${ht} L 0,${ht} Z`);
    }

    function exportData() {
        let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
        if (!h.length) return;
        let csv = "\uFEFF时间,总计," + ASSET_KEYS.map(k => document.getElementById(k).getAttribute('data-name')).join(",") + "\n";
        csv += h.map(r => {
            let row = [r.time, r.amount];
            ASSET_KEYS.forEach(k => row.push(r.detail ? (r.detail[k] || "0") : "0"));
            return row.join(",");
        }).join("\n");
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
        a.download = `资产备份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function importData(inp) {
        const file = inp.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = function(e) {
            try {
                const text = e.target.result;
                const lines = text.split("\n").filter(l => l.trim() !== "");
                let imported = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(",");
                    let detail = {};
                    ASSET_KEYS.forEach((key, idx) => { detail[key] = cols[idx + 2] ? cols[idx + 2].trim() : "0"; });
                    imported.push({ amount: parseFloat(cols[1]), time: cols[0], day: "导入", detail: detail });
                }
                localStorage.setItem('v_all_fn_hist', JSON.stringify(imported));
                render();
            } catch(err) { alert("导入失败"); }
        };
        r.readAsText(file);
        inp.value = "";
    }

    function del(idx) {
        if(confirm("删除此记录？")) {
            let h = JSON.parse(localStorage.getItem('v_all_fn_hist') || "[]");
            h.splice(idx, 1);
            localStorage.setItem('v_all_fn_hist', JSON.stringify(h));
            render();
        }
    }

    function clearAllHistory() {
        if(confirm("确定清空所有轨迹？")) { localStorage.removeItem('v_all_fn_hist'); render(); }
    }

    inputs.forEach(i => i.addEventListener('input', (e) => {
        let v = e.target.value.replace(/[^\d.]/g, "").replace(/\.(?=.*\.)/g, "");
        e.target.value = v;
        localStorage.setItem('v_all_fn_' + e.target.id, v);
        update(true);
    }));
</script>
</body>
</html>
